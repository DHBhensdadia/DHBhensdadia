name: Generate Trophies
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: 'username=DHBhensdadia&theme=onedark&no-frame=true&no-bg=true&column=7&margin-w=15&title=Commits,Stars,Repositories,Experience,PullRequest,Reviews,Issues,MultipleLang,LongTimeUser'
          path: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit trophy card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/trophy.svg
          git diff --staged --quiet || (git commit -m "Update trophies" && git push)
